<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剧资产提取数据源优化 — 交互 Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #eef1f5; color: #333; font-size: 14px; }
        .topbar { background: #fff; border-bottom: 1px solid #ddd; padding: 0 20px; height: 44px; display: flex; align-items: center; gap: 12px; }
        .topbar-tab { background: #4a6cf7; color: #fff; padding: 4px 14px; border-radius: 4px; font-size: 13px; font-weight: 600; }
        .topbar-crumb { font-size: 13px; color: #999; }
        .page { max-width: 1100px; margin: 20px auto; padding: 0 20px; }

        .tab-bar { display: flex; gap: 0; margin-bottom: 0; }
        .tab { padding: 10px 24px; font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid #ddd; border-bottom: none; border-radius: 6px 6px 0 0; background: #f4f5f7; color: #888; margin-right: -1px; }
        .tab.active { background: #fff; color: #333; font-weight: 600; border-bottom: 1px solid #fff; position: relative; z-index: 1; }
        .panel { background: #fff; border: 1px solid #ddd; border-radius: 0 6px 6px 6px; padding: 28px 32px; }
        .section-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 16px; }

        /* flowchart */
        .flow-container { display: flex; justify-content: center; padding: 20px 0; }
        .flow-svg { max-width: 100%; height: auto; }

        /* legend */
        .legend { display: flex; gap: 20px; margin-top: 16px; padding: 12px 16px; background: #f8f9fa; border-radius: 6px; font-size: 12px; color: #666; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 2px; }

        /* interactive controls */
        .sim-section { margin-top: 24px; padding-top: 20px; border-top: 1px solid #eee; }
        .sim-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .sim-label { font-size: 13px; color: #555; font-weight: 500; min-width: 100px; }
        .sim-select { height: 34px; border: 1px solid #d0d0d0; border-radius: 4px; padding: 0 10px; font-size: 13px; color: #333; outline: none; min-width: 200px; }
        .sim-select:focus { border-color: #4a6cf7; }
        .btn { display: inline-flex; align-items: center; justify-content: center; height: 34px; padding: 0 20px; border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid; }
        .btn-primary { background: #4a6cf7; color: #fff; border-color: #4a6cf7; }
        .btn-primary:hover { background: #3a5ce5; }
        .btn-secondary { background: #fff; color: #555; border-color: #ddd; }
        .btn-secondary:hover { background: #f5f5f5; }

        .result-box { margin-top: 16px; border-radius: 8px; padding: 16px 20px; font-size: 13px; line-height: 1.8; }
        .result-success { background: #f0f9f0; border: 1px solid #a5d6a7; color: #2e7d32; }
        .result-reject { background: #fff8e1; border: 1px solid #ffe082; color: #e65100; }
        .result-error { background: #fff5f5; border: 1px solid #fde8e8; color: #c62828; }

        /* highlight animation */
        .flow-highlight { transition: all 0.4s ease; }
        .flow-dim { opacity: 0.15; }
        .flow-active { opacity: 1; }

        /* step indicator */
        .step-list { margin-top: 16px; }
        .step-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; font-size: 13px; color: #999; }
        .step-item.active { color: #333; font-weight: 500; }
        .step-item.done { color: #2e7d32; }
        .step-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; background: #eee; color: #999; }
        .step-item.active .step-num { background: #4a6cf7; color: #fff; }
        .step-item.done .step-num { background: #2e7d32; color: #fff; }
    </style>
</head>
<body>

<div class="topbar">
    <span class="topbar-tab">中台管理</span>
    <span class="topbar-crumb">剧目管理</span>
    <span class="topbar-crumb">›</span>
    <span class="topbar-crumb" style="color:#333;">资产提取数据源优化</span>
</div>

<div class="page">

    <div class="tab-bar">
        <div class="tab active" onclick="switchTab('flow')">资产提取流程</div>
        <div class="tab" onclick="switchTab('reextract')">重新提取接口</div>
    </div>

    <!-- ========== Tab 1: 资产提取流程图 ========== -->
    <div class="panel" id="tab-flow">
        <div class="section-title">资产提取数据源判断流程</div>
        <p style="font-size:13px; color:#888; margin-bottom:20px;">展示发起资产提取后，系统如何判断走 SRT 分支还是我译网分支</p>

        <div class="flow-container">
            <svg class="flow-svg" width="680" height="520" viewBox="0 0 680 520">
                <!-- 起点 -->
                <g id="node-start" class="flow-highlight">
                    <rect x="250" y="10" width="180" height="40" rx="20" fill="#4a6cf7" stroke="none"/>
                    <text x="340" y="35" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">发起资产提取</text>
                </g>
                <!-- 箭头 start -> diamond -->
                <line x1="340" y1="50" x2="340" y2="80" stroke="#ccc" stroke-width="2" marker-end="url(#arrow)"/>

                <!-- 判断菱形 -->
                <g id="node-check" class="flow-highlight">
                    <polygon points="340,80 440,130 340,180 240,130" fill="#fff" stroke="#4a6cf7" stroke-width="2"/>
                    <text x="340" y="126" text-anchor="middle" fill="#333" font-size="12" font-weight="500">中台是否存在</text>
                    <text x="340" y="142" text-anchor="middle" fill="#333" font-size="12" font-weight="500">原始语言SRT文件？</text>
                </g>

                <!-- 分支 A: 有 SRT（左） -->
                <line x1="240" y1="130" x2="120" y2="130" stroke="#ccc" stroke-width="2"/>
                <line x1="120" y1="130" x2="120" y2="200" stroke="#ccc" stroke-width="2" marker-end="url(#arrow)"/>
                <text x="175" y="120" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="600">有</text>

                <g id="node-srt" class="flow-highlight">
                    <rect x="30" y="200" width="180" height="44" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
                    <text x="120" y="218" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="600">分支 A</text>
                    <text x="120" y="234" text-anchor="middle" fill="#2e7d32" font-size="11">解析中台 SRT 文件</text>
                </g>

                <line x1="120" y1="244" x2="120" y2="290" stroke="#ccc" stroke-width="2" marker-end="url(#arrow)"/>

                <g id="node-srt-detail" class="flow-highlight">
                    <rect x="30" y="290" width="180" height="36" rx="6" fill="#f0f9f0" stroke="#a5d6a7" stroke-width="1"/>
                    <text x="120" y="313" text-anchor="middle" fill="#555" font-size="11">获取原文 + 时间戳</text>
                </g>

                <!-- 分支 B: 无 SRT（右） -->
                <line x1="440" y1="130" x2="560" y2="130" stroke="#ccc" stroke-width="2"/>
                <line x1="560" y1="130" x2="560" y2="200" stroke="#ccc" stroke-width="2" marker-end="url(#arrow)"/>
                <text x="495" y="120" text-anchor="middle" fill="#e65100" font-size="12" font-weight="600">无</text>

                <g id="node-weyi" class="flow-highlight">
                    <rect x="470" y="200" width="180" height="44" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
                    <text x="560" y="218" text-anchor="middle" fill="#e65100" font-size="12" font-weight="600">分支 B</text>
                    <text x="560" y="234" text-anchor="middle" fill="#e65100" font-size="11">调用「我译网」提取字幕</text>
                </g>

                <line x1="560" y1="244" x2="560" y2="290" stroke="#ccc" stroke-width="2" marker-end="url(#arrow)"/>

                <g id="node-weyi-detail" class="flow-highlight">
                    <rect x="470" y="290" width="180" height="36" rx="6" fill="#fff8e1" stroke="#ffe082" stroke-width="1"/>
                    <text x="560" y="313" text-anchor="middle" fill="#555" font-size="11">获取字幕 + 时间戳</text>
                </g>

                <!-- 汇合 -->
                <line x1="120" y1="326" x2="120" y2="370" stroke="#ccc" stroke-width="2"/>
                <line x1="560" y1="326" x2="560" y2="370" stroke="#ccc" stroke-width="2"/>
                <line x1="120" y1="370" x2="560" y2="370" stroke="#ccc" stroke-width="2"/>
                <line x1="340" y1="370" x2="340" y2="400" stroke="#ccc" stroke-width="2" marker-end="url(#arrow)"/>

                <g id="node-model" class="flow-highlight">
                    <rect x="230" y="400" width="220" height="44" rx="6" fill="#f0f4ff" stroke="#4a6cf7" stroke-width="1.5"/>
                    <text x="340" y="418" text-anchor="middle" fill="#4a6cf7" font-size="12" font-weight="600">传给多模态模型</text>
                    <text x="340" y="434" text-anchor="middle" fill="#888" font-size="11">Prompt 限制：不可篡改 SRT 原文</text>
                </g>

                <line x1="340" y1="444" x2="340" y2="476" stroke="#ccc" stroke-width="2" marker-end="url(#arrow)"/>

                <g id="node-result" class="flow-highlight">
                    <rect x="250" y="476" width="180" height="40" rx="20" fill="#4a6cf7" stroke="none"/>
                    <text x="340" y="501" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">输出最终结果</text>
                </g>

                <!-- 约束标注 -->
                <g id="node-constraint" class="flow-highlight">
                    <rect x="230" y="200" width="220" height="60" rx="6" fill="#fff5f5" stroke="#ef9a9a" stroke-width="1" stroke-dasharray="4,3"/>
                    <text x="340" y="222" text-anchor="middle" fill="#c62828" font-size="11" font-weight="600">强制约束</text>
                    <text x="340" y="238" text-anchor="middle" fill="#c62828" font-size="10">走分支A时，字幕/文本部分</text>
                    <text x="340" y="252" text-anchor="middle" fill="#c62828" font-size="10">必须严格遵照 SRT 原文与时间戳</text>
                </g>

                <!-- 箭头 marker -->
                <defs>
                    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
                        <path d="M0,0 L8,4 L0,8 Z" fill="#ccc"/>
                    </marker>
                </defs>
            </svg>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#2e7d32;"></div>分支 A：有 SRT 文件，直接解析</div>
            <div class="legend-item"><div class="legend-dot" style="background:#e65100;"></div>分支 B：无 SRT 文件，调用我译网</div>
            <div class="legend-item"><div class="legend-dot" style="background:#c62828;"></div>强制约束：不可篡改 SRT 原文</div>
        </div>

        <!-- 模拟 -->
        <div class="sim-section">
            <div class="section-title">模拟资产提取</div>
            <div class="sim-row">
                <span class="sim-label">选择剧目</span>
                <select class="sim-select" id="simDrama">
                    <option value="srt">甜蜜陷阱（ID: 10234）— 已有 SRT 文件</option>
                    <option value="srt">逆袭人生（ID: 10567）— 已有 SRT 文件</option>
                    <option value="nosrt">破晓之光（ID: 10891）— 无 SRT 文件</option>
                    <option value="nosrt">都市密码（ID: 11023）— 无 SRT 文件</option>
                </select>
                <button class="btn btn-primary" onclick="simulateExtract()">发起提取</button>
                <button class="btn btn-secondary" onclick="resetSim()">重置</button>
            </div>
            <div class="step-list" id="simSteps"></div>
            <div id="simResult"></div>
        </div>
    </div>

    <!-- ========== Tab 2: 重新提取接口 ========== -->
    <div class="panel" id="tab-reextract" style="display:none;">
        <div class="section-title">重新提取接口校验流程</div>
        <p style="font-size:13px; color:#888; margin-bottom:20px;">展示外部系统调用重新提取接口时的校验逻辑</p>

        <div class="flow-container">
            <svg class="flow-svg" width="500" height="520" viewBox="0 0 500 520">
                <!-- 起点 -->
                <g>
                    <rect x="160" y="10" width="180" height="40" rx="20" fill="#4a6cf7" stroke="none"/>
                    <text x="250" y="35" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">调用重新提取接口</text>
                </g>
                <line x1="250" y1="50" x2="250" y2="80" stroke="#ccc" stroke-width="2" marker-end="url(#arrow2)"/>

                <!-- 校验1 -->
                <g>
                    <polygon points="250,80 370,130 250,180 130,130" fill="#fff" stroke="#4a6cf7" stroke-width="2"/>
                    <text x="250" y="126" text-anchor="middle" fill="#333" font-size="12" font-weight="500">是否有执行中的</text>
                    <text x="250" y="142" text-anchor="middle" fill="#333" font-size="12" font-weight="500">提取任务？</text>
                </g>

                <!-- 校验1 -> 是（拒绝） -->
                <line x1="370" y1="130" x2="440" y2="130" stroke="#ccc" stroke-width="2" marker-end="url(#arrow2)"/>
                <text x="400" y="120" text-anchor="middle" fill="#c62828" font-size="12" font-weight="600">是</text>
                <g>
                    <rect x="440" y="110" width="50" height="40" rx="4" fill="#fff5f5" stroke="#ef9a9a" stroke-width="1"/>
                    <text x="465" y="134" text-anchor="middle" fill="#c62828" font-size="11" font-weight="600">拒绝</text>
                </g>

                <!-- 校验1 -> 否 -->
                <line x1="250" y1="180" x2="250" y2="220" stroke="#ccc" stroke-width="2" marker-end="url(#arrow2)"/>
                <text x="265" y="200" fill="#2e7d32" font-size="12" font-weight="600">否</text>

                <!-- 校验2 -->
                <g>
                    <polygon points="250,220 390,275 250,330 110,275" fill="#fff" stroke="#4a6cf7" stroke-width="2"/>
                    <text x="250" y="268" text-anchor="middle" fill="#333" font-size="12" font-weight="500">最后提取时间</text>
                    <text x="250" y="284" text-anchor="middle" fill="#333" font-size="12" font-weight="500">晚于字幕上传时间？</text>
                </g>

                <!-- 校验2 -> 是（拒绝） -->
                <line x1="390" y1="275" x2="440" y2="275" stroke="#ccc" stroke-width="2" marker-end="url(#arrow2)"/>
                <text x="410" y="265" text-anchor="middle" fill="#c62828" font-size="12" font-weight="600">是</text>
                <g>
                    <rect x="440" y="255" width="50" height="40" rx="4" fill="#fff5f5" stroke="#ef9a9a" stroke-width="1"/>
                    <text x="465" y="279" text-anchor="middle" fill="#c62828" font-size="11" font-weight="600">拒绝</text>
                </g>

                <!-- 校验2 -> 否（通过） -->
                <line x1="250" y1="330" x2="250" y2="370" stroke="#ccc" stroke-width="2" marker-end="url(#arrow2)"/>
                <text x="265" y="350" fill="#2e7d32" font-size="12" font-weight="600">否</text>

                <!-- 校验通过 -->
                <g>
                    <rect x="160" y="370" width="180" height="44" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
                    <text x="250" y="388" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="600">校验通过</text>
                    <text x="250" y="404" text-anchor="middle" fill="#2e7d32" font-size="11">发起资产提取任务</text>
                </g>

                <line x1="250" y1="414" x2="250" y2="450" stroke="#ccc" stroke-width="2" marker-end="url(#arrow2)"/>

                <!-- 走3.1流程 -->
                <g>
                    <rect x="160" y="450" width="180" height="40" rx="6" fill="#f0f4ff" stroke="#4a6cf7" stroke-width="1.5"/>
                    <text x="250" y="475" text-anchor="middle" fill="#4a6cf7" font-size="12" font-weight="500">走 3.1 数据源判断逻辑</text>
                </g>

                <!-- 拒绝原因标注 -->
                <g>
                    <rect x="370" y="160" width="120" height="30" rx="4" fill="#fff8e1" stroke="#ffe082" stroke-width="1"/>
                    <text x="430" y="180" text-anchor="middle" fill="#e65100" font-size="10">存在执行中的任务</text>
                </g>
                <line x1="430" y1="150" x2="465" y2="160" stroke="#ffe082" stroke-width="1"/>

                <g>
                    <rect x="370" y="310" width="120" height="30" rx="4" fill="#fff8e1" stroke="#ffe082" stroke-width="1"/>
                    <text x="430" y="330" text-anchor="middle" fill="#e65100" font-size="10">字幕未更新</text>
                </g>
                <line x1="430" y1="295" x2="465" y2="310" stroke="#ffe082" stroke-width="1"/>

                <defs>
                    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
                        <path d="M0,0 L8,4 L0,8 Z" fill="#ccc"/>
                    </marker>
                </defs>
            </svg>
        </div>

        <!-- 模拟接口调用 -->
        <div class="sim-section">
            <div class="section-title">模拟接口调用</div>
            <div class="sim-row">
                <span class="sim-label">选择场景</span>
                <select class="sim-select" id="reextractScene">
                    <option value="success">字幕已更新，无执行中任务 → 成功</option>
                    <option value="running">有执行中的提取任务 → 拒绝</option>
                    <option value="nochange">字幕未更新（提取时间晚于上传时间）→ 拒绝</option>
                </select>
            </div>
            <div class="sim-row">
                <button class="btn btn-primary" onclick="simulateReextract()">调用接口</button>
                <button class="btn btn-secondary" onclick="clearReextractResult()">清除</button>
            </div>
            <div id="reextractResult"></div>
        </div>
    </div>

</div>

<script>
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((el, i) => {
        const tabs = ['flow', 'reextract'];
        el.classList.toggle('active', tabs[i] === tab);
    });
    ['flow', 'reextract'].forEach(t => {
        document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
    });
}

// ===== Tab 1: 模拟提取 =====
function simulateExtract() {
    const hasSrt = document.getElementById('simDrama').value === 'srt';
    const branch = hasSrt ? 'A' : 'B';
    const steps = [
        { text: '发起资产提取请求', done: true },
        { text: '查询中台数据库，检查 SRT 文件关联', done: true },
        { text: hasSrt ? '检测到 SRT 文件，走分支 A' : '未检测到 SRT 文件，走分支 B', done: true },
        { text: hasSrt ? '解析中台 SRT 文件，获取原文 + 时间戳' : '调用「我译网」提取字幕 + 时间戳', done: false, active: true },
        { text: '传给多模态模型' + (hasSrt ? '（Prompt 限制：不可篡改 SRT 原文）' : ''), done: false },
        { text: '输出最终资产提取结果', done: false }
    ];

    const container = document.getElementById('simSteps');
    container.innerHTML = '';
    let delay = 0;
    steps.forEach((s, i) => {
        setTimeout(() => {
            const items = container.querySelectorAll('.step-item');
            if (items.length > 0) {
                const prev = items[items.length - 1];
                prev.classList.remove('active');
                prev.classList.add('done');
                prev.querySelector('.step-num').textContent = '✓';
            }
            const div = document.createElement('div');
            div.className = 'step-item active';
            div.innerHTML = '<span class="step-num">' + (i + 1) + '</span><span>' + s.text + '</span>';
            container.appendChild(div);

            if (i === steps.length - 1) {
                setTimeout(() => {
                    div.classList.remove('active');
                    div.classList.add('done');
                    div.querySelector('.step-num').textContent = '✓';
                    document.getElementById('simResult').innerHTML =
                        '<div class="result-box result-success">' +
                        '<strong>提取完成</strong><br>' +
                        '数据源：' + (hasSrt ? '中台 SRT 文件（分支 A）' : '我译网（分支 B）') + '<br>' +
                        'is_srt_extracted：<strong>' + (hasSrt ? '1' : '0') + '</strong>' +
                        '</div>';
                }, 500);
            }
        }, delay);
        delay += 600;
    });
}

function resetSim() {
    document.getElementById('simSteps').innerHTML = '';
    document.getElementById('simResult').innerHTML = '';
}

// ===== Tab 2: 模拟重新提取 =====
function simulateReextract() {
    const scene = document.getElementById('reextractScene').value;
    const container = document.getElementById('reextractResult');
    if (scene === 'success') {
        container.innerHTML =
            '<div class="result-box result-success">' +
            '<strong>200 OK</strong><br>' +
            '{\n  "code": 0,\n  "message": "提取任务已发起",\n  "data": {\n    "task_id": "task_20260625_10234",\n    "drama_id": 10234,\n    "status": "pending"\n  }\n}'.replace(/\n/g, '<br>').replace(/ {2}/g, '&nbsp;&nbsp;') +
            '</div>';
    } else if (scene === 'running') {
        container.innerHTML =
            '<div class="result-box result-error">' +
            '<strong>409 Conflict</strong><br>' +
            '{\n  "code": 40901,\n  "message": "存在执行中的提取任务，请稍后重试",\n  "data": {\n    "running_task_id": "task_20260625_10234"\n  }\n}'.replace(/\n/g, '<br>').replace(/ {2}/g, '&nbsp;&nbsp;') +
            '</div>';
    } else {
        container.innerHTML =
            '<div class="result-box result-reject">' +
            '<strong>422 Unprocessable</strong><br>' +
            '{\n  "code": 42201,\n  "message": "字幕未更新，无需重新提取",\n  "data": {\n    "last_extract_time": "2026-06-25 10:30:00",\n    "subtitle_upload_time": "2026-06-24 15:00:00"\n  }\n}'.replace(/\n/g, '<br>').replace(/ {2}/g, '&nbsp;&nbsp;') +
            '</div>';
    }
}

function clearReextractResult() {
    document.getElementById('reextractResult').innerHTML = '';
}
